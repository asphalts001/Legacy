name: Build Cordova APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  android-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Cordova
        run: npm install -g cordova@12

      - name: Install Gradle 8.7 and shadow system Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O /tmp/gradle-8.7.zip
          unzip -q /tmp/gradle-8.7.zip -d /opt/gradle
          sudo ln -sf /opt/gradle/gradle-8.7/bin/gradle /usr/local/bin/gradle
          sudo ln -sf /opt/gradle/gradle-8.7/bin/gradle /usr/bin/gradle
          sudo mkdir -p /usr/share/gradle-9.4.1/bin
          sudo ln -sf /opt/gradle/gradle-8.7/bin/gradle /usr/share/gradle-9.4.1/bin/gradle
          gradle --version

      - name: Install Android Build Tools
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "build-tools;33.0.2" \
            "platforms;android-34"

      - name: Add Android Platform
        run: cordova platform add android@12.0.1

      - name: Install Cordova Plugins
        run: |
          cordova plugin add cordova-plugin-media
          cordova plugin add cordova-plugin-file

      - name: Pin ALL Gradle wrappers to 8.7
        run: |
          find platforms/android -name "gradle-wrapper.properties" | while read f; do
            sed -i 's|distributionUrl=.*|distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-all.zip|' "$f"
            echo "Patched: $f"
          done

      - name: Bump version code
        run: |
          VERSION_CODE=${{ github.run_number }}
          echo "Setting android-versionCode to $VERSION_CODE"
          sed -i "s/version=\"[^\"]*\"/version=\"1.0.$VERSION_CODE\"/" config.xml
          sed -i "/<platform name=\"android\">/a\    <preference name=\"android-versionCode\" value=\"$VERSION_CODE\" />" config.xml

      - name: Decode Keystore from Secrets
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore

      - name: Build and Sign Release APK
        run: |
          cordova build android --release -- \
            --keystore=release.keystore \
            --storePassword="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            --alias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            --password="${{ secrets.ANDROID_KEY_PASSWORD }}" \
            --packageType=apk

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: legacy-app-signed
          path: platforms/android/app/build/outputs/apk/release/*.apk
