name: Build Cordova APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  android-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Cordova
        run: npm install -g cordova@12

      - name: Install Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Add Android Platform
        run: cordova platform add android@12.0.1
        env:
          GRADLE_HOME: /opt/gradle/gradle-8.7
          PATH: /opt/gradle/gradle-8.7/bin:${{ env.PATH }}

      - name: Pin Gradle wrapper to 8.7
        run: |
          find platforms/android -name "gradle-wrapper.properties" -exec \
          sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.7-all.zip|' {} \;

      - name: Build APK
        run: cordova build android --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: legacy-app-debug
          path: platforms/android/app/build/outputs/apk/debug/*.apk
          
