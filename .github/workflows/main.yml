name: Build Cordova APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Cordova
        run: npm install -g cordova@12

      - name: Install Gradle 8.7
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O /tmp/gradle-8.7.zip
          unzip -q /tmp/gradle-8.7.zip -d /opt/gradle
          sudo ln -sf /opt/gradle/gradle-8.7/bin/gradle /usr/local/bin/gradle
          sudo ln -sf /opt/gradle/gradle-8.7/bin/gradle /usr/bin/gradle
          sudo mkdir -p /usr/share/gradle-9.4.1/bin
          sudo ln -sf /opt/gradle/gradle-8.7/bin/gradle /usr/share/gradle-9.4.1/bin/gradle
          gradle --version

      - name: Install Android SDK
  run: |
    echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
      "build-tools;33.0.2" \
      "build-tools;34.0.0" \
      "platforms;android-34" \
      "platforms;android-35"

      - name: Add Android Platform
        run: cordova platform add android@12.0.1

      - name: Install Cordova Plugins
        run: |
          cordova plugin add cordova-plugin-media
          cordova plugin add cordova-plugin-file
          cordova plugin add cordova-plugin-customurlscheme \
            --variable URL_SCHEME=legacy
          cordova plugin add cordova-plugin-inappbrowser

      - name: Prepare Cordova
        run: cordova prepare android

      - name: Pin Gradle wrappers to 8.7
        run: |
          find platforms/android -name "gradle-wrapper.properties" | while read f; do
            sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.7-all.zip|' "$f"
            echo "Patched: $f"
          done

      - name: Bump version code
        run: |
          VERSION_CODE=${{ github.run_number }}
          echo "Setting android-versionCode to $VERSION_CODE"
          sed -i "s/version=\"[^\"]*\"/version=\"1.0.$VERSION_CODE\"/" config.xml
          sed -i "/<platform name=\"android\">/a\\    <preference name=\"android-versionCode\" value=\"$VERSION_CODE\" />" config.xml

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/release.keystore

      - name: Convert keystore to JKS
        run: |
          keytool -importkeystore \
            -srckeystore ${{ github.workspace }}/release.keystore \
            -srcstoretype PKCS12 \
            -srcstorepass ${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -destkeystore ${{ github.workspace }}/release.jks \
            -deststoretype JKS \
            -deststorepass ${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -srcalias ${{ secrets.ANDROID_KEY_ALIAS }} \
            -destalias ${{ secrets.ANDROID_KEY_ALIAS }} \
            -noprompt

      - name: Build Release APK
        run: cordova build android --release -- --packageType=apk

      - name: Sign APK
        run: |
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks ${{ github.workspace }}/release.jks \
            --ks-pass pass:${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            --key-pass pass:${{ secrets.ANDROID_KEY_PASSWORD }} \
            --ks-key-alias ${{ secrets.ANDROID_KEY_ALIAS }} \
            platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Verify signing
        run: |
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify --verbose \
            platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Rename APK
        run: |
          mv platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk \
             platforms/android/app/build/outputs/apk/release/legacy-v1.0.${{ github.run_number }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: legacy-app-release
          path: platforms/android/app/build/outputs/apk/release/legacy-v1.0.${{ github.run_number }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Legacy v1.0.${{ github.run_number }}"
          body: |
            Built from commit ${{ github.sha }}
            Branch: ${{ github.ref_name }}
          files: platforms/android/app/build/outputs/apk/release/legacy-v1.0.${{ github.run_number }}.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
