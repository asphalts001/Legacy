<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <link rel="stylesheet" href="theme.css">
  <title>Royalty</title>
  <style>
    /* ── Your existing CSS (keep as is) ── */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg, #0a0a0f); color: var(--text, #fff); font-family: 'Crimson Pro', Georgia, serif; font-size: 16px; min-height: 100vh; padding: 0 0 80px; max-width: 480px; margin: 0 auto; -webkit-text-size-adjust: 100%; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
    body::before { content: ''; position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse 55% 35% at 15% 5%, rgba(201,168,76,0.07) 0%, transparent 65%), radial-gradient(ellipse 45% 30% at 85% 90%, rgba(139,26,26,0.05) 0%, transparent 65%); pointer-events: none; }
    .page { position: relative; z-index: 1; padding: 0 18px; }
    .hub-header { display: flex; align-items: flex-start; justify-content: space-between; padding: 28px 18px 20px; position: relative; z-index: 1; }
    .header-left { flex: 1; }
    .hub-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 550; letter-spacing: -0.02em; line-height: 1.2; color: var(--text, #e8e8f0); }
    .hub-title .accent { color: var(--gold-light, #e8c97a); }
    .hub-date { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--navy-light: #243259;); opacity: 0.65; margin-top: 5px; line-height: 1.4; }
    #music-toggle { background: transparent; border: 1px solid rgba(184,150,46,0.3); border-radius: 8px; padding: 7px 13px; font-size: 15px; cursor: pointer; flex-shrink: 0; margin-top: 2px; margin-left: 12px; transition: color 0.2s, border-color 0.2s, background 0.2s; color: var(--gold-light, #e8c97a); opacity: 0.55; line-height: 1; }
    #music-toggle.on { color: var(--gold-light, #e8c97a); border-color: var(--gold-light, #e8c97a); background: rgba(184,150,46,0.1); opacity: 1; }
    .section-label { font-family: 'Syne', sans-serif; font-size: 9px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold-light, #e8c97a); opacity: 0.7; margin-bottom: 12px; margin-top: 10px; display: flex; align-items: center; gap: 10px; line-height: 1; }
    .section-label::after { content: ''; flex: 1; height: 1px; background: rgba(184,150,46,0.25); }
    .section { margin-bottom: 32px; }
    .subject-grid { display: flex; flex-direction: column; gap: 10px; }
    .btn-subject { display: flex; align-items: center; gap: 14px; padding: 15px 16px; background: rgba(255,255,255,0.04); border: 1px solid rgba(184,150,46,0.22); border-radius: 12px; color: #f0e8d0; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.04em; text-decoration: none; cursor: pointer; transition: border-color 0.2s, box-shadow 0.2s, background 0.2s; line-height: 1; position: relative; overflow: hidden; }
    .btn-subject::after { content: ''; position: absolute; inset: 0; background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.04) 50%, transparent 70%); transform: translateX(-100%); transition: transform 0.4s; }
    .btn-subject:active::after { transform: translateX(100%); }
    .btn-subject:active { transform: scale(0.98); }
    .btn-subject.chem { --c: #4ecdc4; }
    .btn-subject.phys { --c: var(--gold-light, #e8c97a); }
    .btn-subject.mcq { --c: #e05a5a; }
    .btn-subject.egypt { --c: #d4a843; }
    .btn-subject:hover { border-color: var(--c); box-shadow: 0 0 0 1px var(--c), 0 4px 20px rgba(0,0,0,0.3); background: color-mix(in srgb, var(--c) 5%, var(--surface, #111118)); }
    .subj-icon { width: 38px; height: 38px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 19px; line-height: 1; background: color-mix(in srgb, var(--c) 12%, transparent); flex-shrink: 0; transition: transform 0.2s; }
    .btn-subject:hover .subj-icon { transform: scale(1.08); }
    .subj-label { flex: 1; }
    .subj-meta { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--gold-light, #e8c97a); opacity: 0.6; font-weight: 400; letter-spacing: 0.05em; margin-top: 2px; }
    .subj-arrow { color: var(--gold-light, #e8c97a); opacity: 0.5; font-size: 20px; line-height: 1; transition: transform 0.2s, color 0.2s, opacity 0.2s; }
    .btn-subject:hover .subj-arrow { transform: translateX(3px); color: var(--c); opacity: 1; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .stat-box { background: rgba(255,255,255,0.04); border: 1px solid rgba(184,150,46,0.22); border-radius: 10px; padding: 14px 10px; text-align: center; transition: border-color 0.2s; }
    .stat-box:hover { border-color: rgba(232,201,122,0.5); }
    .stat-val { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; color: var(--gold-light, #e8c97a); line-height: 1; }
    .stat-lbl { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--gold-light, #e8c97a); opacity: 0.6; margin-top: 5px; line-height: 1.3; letter-spacing: 0.06em; }
    .activity-list { display: flex; flex-direction: column; }
    .activity-item { display: flex; align-items: flex-start; gap: 11px; padding: 11px 0; border-bottom: 1px solid rgba(184,150,46,0.18); }
    .activity-item:last-child { border-bottom: none; }
    .act-dot { width: 7px; height: 7px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
    .act-dot.MCQ { background: #e05a5a; box-shadow: 0 0 5px #e05a5a; }
    .act-dot.Physics { background: #e8c97a; box-shadow: 0 0 5px #e8c97a; }
    .act-dot.Chemistry { background: #4ecdc4; box-shadow: 0 0 5px #4ecdc4; }
    .act-body { flex: 1; line-height: 1.4; }
    .act-subject { font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700; line-height: 1.3; letter-spacing: 0.06em; text-transform: uppercase; color: var(--gold-light, #e8c97a); opacity: 0.65; }
    .act-detail { font-family: 'Crimson Pro', Georgia, serif; color: #f0e8d0; font-size: 14px; line-height: 1.3; margin-top: 1px; }
    .act-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
    .act-score { font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 2px 7px; border-radius: 4px; white-space: nowrap; line-height: 1.4; }
    .act-score.high { background: rgba(76,175,125,0.15); color: #5fd49a; }
    .act-score.mid { background: rgba(232,201,122,0.15); color: #e8c97a; }
    .act-score.low { background: rgba(224,90,90,0.15); color: #e05a5a; }
    .act-time { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--gold-light, #e8c97a); opacity: 0.5; white-space: nowrap; line-height: 1.3; }
    .empty-feed { text-align: center; padding: 28px 20px; color: var(--gold-light, #e8c97a); opacity: 0.55; font-family: 'JetBrains Mono', monospace; font-size: 11px; line-height: 1.7; border: 1px dashed rgba(184,150,46,0.3); border-radius: 10px; }
    .btn-export { width: 100%; padding: 12px; background: transparent; border: 1px solid rgba(184,150,46,0.3); border-radius: 8px; color: var(--gold-light, #e8c97a); opacity: 0.65; font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; line-height: 1; transition: border-color 0.2s, color 0.2s, opacity 0.2s; }
    .btn-export:hover { border-color: var(--gold-light, #e8c97a); color: var(--gold-light, #e8c97a); opacity: 1; }
    .fade-in { opacity: 0; transform: translateY(12px); animation: fadeUp 0.4s ease forwards; }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    .fade-in:nth-child(1) { animation-delay: 0.05s; }
    .fade-in:nth-child(2) { animation-delay: 0.12s; }
    .fade-in:nth-child(3) { animation-delay: 0.19s; }
    .fade-in:nth-child(4) { animation-delay: 0.26s; }
    .fade-in:nth-child(5) { animation-delay: 0.33s; }
  </style>
</head>
<body>

  <header class="hub-header">
    <div class="header-left">
      <div class="hub-title"><span class="accent"></span>let's start now !<br></div>
      <div class="hub-date" id="today-date"></div>
    </div>
    <button id="music-toggle" onclick="AudioManager.toggle()" title="Toggle music">♪</button>
  </header>

  <div class="page">
    <div class="section fade-in">
      <div class="section-label">Here we go again</div>
      <div class="subject-grid">
        <a class="btn-subject chem" href="pbl_full_pasha.html">
          <div class="subj-icon">🇹🇷</div>
          <div class="subj-label"><div>kemal pasha</div><div class="subj-meta">commander of Armenia</div></div>
          <div class="subj-arrow">›</div>
        </a>
        <a class="btn-subject phys" href="phiross.html">
          <div class="subj-icon">👑</div>
          <div class="subj-label"><div>pharaoh</div><div class="subj-meta">gypsy</div></div>
          <div class="subj-arrow">›</div>
        </a>
        <a class="btn-subject mcq" href="phiross_factory.html">
          <div class="subj-icon">🍨</div>
          <div class="subj-label"><div>generator</div><div class="subj-meta">finish it quickly</div></div>
          <div class="subj-arrow">›</div>
        </a>
        <a class="btn-subject egypt" href="egyptian.html">
          <div class="subj-icon">👑</div>
          <div class="subj-label"><div>courtesy</div><div class="subj-meta">read this peasent</div></div>
          <div class="subj-arrow">›</div>
        </a>
      </div>
    </div>

    <div class="section fade-in">
      <div class="section-label">Your Stupid Activities</div>
      <div class="stats-row">
        <div class="stat-box"><div class="stat-val" id="stat-total">—</div><div class="stat-lbl">Questions</div></div>
        <div class="stat-box"><div class="stat-val" id="stat-sessions">—</div><div class="stat-lbl">Sessions</div></div>
        <div class="stat-box"><div class="stat-val" id="stat-avg">—</div><div class="stat-lbl">Avg acc</div></div>
      </div>
    </div>

    <div class="section fade-in">
      <div class="section-label">Recent Stupidities</div>
      <div class="activity-list" id="activity-list">
        <div class="empty-feed">DO SOMETHING LAZY<br>no history yet</div>
      </div>
    </div>

    <div class="section fade-in">
      <div class="section-label">Data</div>
      <button class="btn-export" onclick="exportData()">we know you are too dumb to track 18 sets, save history here</button>
    </div>
  </div>

  <!-- ═════ CORRECT ORDER ═════ -->
  <!-- 1. StateManager (defines window.StateManager) -->
  <script src="StateManager.js"></script>
  <!-- 2. Tracker (depends on StateManager) -->
  <script src="tracker.js"></script>
  <!-- 3. Audio -->
  <script src="audio.js"></script>

  <!-- 4. Dashboard logic (no migration, no duplicates) -->
  <script>
    // Date
    document.getElementById('today-date').textContent =
      new Date().toLocaleDateString('en-IN', {
        weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
      });

   function renderStats() {
  if (typeof Tracker === 'undefined') return;
  const s = Tracker.getStats();
  document.getElementById('stat-total').textContent = s.totalQuestions || '0';
  document.getElementById('stat-sessions').textContent = s.totalSessions || '0';
  document.getElementById('stat-avg').textContent = s.totalSessions ? s.avgAccuracy + '%' : '—';
}

    function renderActivity() {
  if (typeof Tracker === 'undefined') return;
  const list = document.getElementById('activity-list');
  let recent = Tracker.getRecent(8);
  
  console.log('📋 DASHBOARD received recent entries:', recent);
  
  if (!recent.length) {
    list.innerHTML = '<div class="empty-feed">DO SOMETHING LAZY<br>no history yet</div>';
    return;
  }
  

  
  list.innerHTML = recent.map(e => {
    let scoreBadge = '';
    let detail = '';
    
    if (e.type === 'score') {
      const accuracy = e.score || 0;
      const cls = accuracy >= 75 ? 'high' : accuracy >= 50 ? 'mid' : 'low';
      scoreBadge = `<span class="act-score ${cls}">${accuracy}%</span>`;
      
      const totalQ = e.total || '?';
      const correct = e.correct || 0;
      const wrong = e.wrong || 0;
      const skipped = e.skipped || 0;
      const attempted = correct + wrong;
      
      detail = `${e.topic} · ${totalQ}q · ${correct}/${attempted} correct`;
      if (skipped > 0) detail += ` · ${skipped} skipped`;
    } else {
      detail = `Read: ${e.chapter}`;
    }
    
    let subjectClass = 'MCQ';
    if (e.subject === 'Physics') subjectClass = 'Physics';
    else if (e.subject === 'Chemistry') subjectClass = 'Chemistry';
    
    return `
      <div class="activity-item">
        <div class="act-dot ${subjectClass}"></div>
        <div class="act-body">
          <div class="act-subject">${e.subject}</div>
          <div class="act-detail">${detail}</div>
        </div>
        <div class="act-right">
          ${scoreBadge}
          <div class="act-time">${Tracker.timeAgo(e.ts)}</div>
        </div>
      </div>`;
  }).join('');
}

    function exportData() {
      const blob = new Blob([Tracker.exportJSON()], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `study-log-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    window.addEventListener('tracker:update', () => {
      renderStats();
      renderActivity();
    });

    renderStats();
    renderActivity();
  </script>

  <script>
    AudioManager.init('dashboard.m4a');
  </script>
</body>
</html>
