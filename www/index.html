<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <link rel="stylesheet" href="theme.css">
  <title>Bhalo hai🐻🐻🤙🤙</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;500&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg, #0a0a0f);
      color: var(--text, #e8e8f0);
      font-family: 'Crimson Pro', Georgia, serif;
      font-size: 16px;
      min-height: 100vh;
      padding: 0 0 80px;
      max-width: 480px;
      margin: 0 auto;
      -webkit-text-size-adjust: 100%;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── Ambient background glow ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 55% 35% at 15% 5%,  rgba(124,106,240,0.08) 0%, transparent 65%),
        radial-gradient(ellipse 45% 30% at 85% 90%, rgba(78,205,196,0.05)  0%, transparent 65%);
      pointer-events: none;
    }

    /* ── Page content sits above glow ── */
    .page { position: relative; z-index: 1; padding: 0 18px; }

    /* ══════════════════════════════════════
       HEADER
    ══════════════════════════════════════ */
    .hub-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 28px 18px 20px;
      position: relative;
      z-index: 1;
    }

    .header-left { flex: 1; }

    .hub-title {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.2;
      color: var(--text, #e8e8f0);
    }
    .hub-title .accent { color: var(--phys, #7c6af0); }

    .hub-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--muted, #6b6b8a);
      margin-top: 5px;
      line-height: 1.4;
    }

    /* ── Music toggle ── */
    #music-toggle {
      background: transparent;
      border: 1px solid #2e2e4e;
      border-radius: 8px;
      padding: 7px 13px;
      font-size: 15px;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 2px;
      margin-left: 12px;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
      color: var(--muted, #6b6b8a);
      line-height: 1;
    }
    #music-toggle.on {
      color: var(--accent, #7c6af0);
      border-color: var(--accent, #7c6af0);
      background: rgba(124,106,240,0.08);
    }

    /* ══════════════════════════════════════
       SECTION LABEL
    ══════════════════════════════════════ */
    .section-label {
      font-family: 'Syne', sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted, #6b6b8a);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      line-height: 1;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border, #1e1e2e);
    }

    /* ══════════════════════════════════════
       SUBJECT BUTTONS
    ══════════════════════════════════════ */
    .section { margin-bottom: 32px; }

    .subject-grid { display: flex; flex-direction: column; gap: 10px; }

    .btn-subject {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 15px 16px;
      background: var(--surface, #111118);
      border: 1px solid var(--border, #1e1e2e);
      border-radius: 12px;
      color: var(--text, #e8e8f0);
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-decoration: none;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      line-height: 1;
      position: relative;
      overflow: hidden;
    }

    /* animated shimmer on press */
    .btn-subject::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.04) 50%, transparent 70%);
      transform: translateX(-100%);
      transition: transform 0.4s;
    }
    .btn-subject:active::after { transform: translateX(100%); }
    .btn-subject:active { transform: scale(0.98); }

    .btn-subject.chem { --c: var(--chem, #4ecdc4); }
    .btn-subject.phys { --c: var(--phys, #7c6af0); }
    .btn-subject.mcq  { --c: var(--mcq,  #e05a5a); }

    .btn-subject:hover {
      border-color: var(--c);
      box-shadow: 0 0 0 1px var(--c), 0 4px 20px rgba(0,0,0,0.3);
      background: color-mix(in srgb, var(--c) 5%, var(--surface, #111118));
    }

    .subj-icon {
      width: 38px;
      height: 38px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 19px;
      line-height: 1;
      background: color-mix(in srgb, var(--c) 12%, transparent);
      flex-shrink: 0;
      transition: transform 0.2s;
    }
    .btn-subject:hover .subj-icon { transform: scale(1.08); }

    .subj-label { flex: 1; }

    .subj-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: var(--muted, #6b6b8a);
      font-weight: 400;
      letter-spacing: 0.05em;
      margin-top: 2px;
    }

    .subj-arrow {
      color: var(--muted, #6b6b8a);
      font-size: 20px;
      line-height: 1;
      transition: transform 0.2s, color 0.2s;
    }
    .btn-subject:hover .subj-arrow {
      transform: translateX(3px);
      color: var(--c);
    }

    /* ══════════════════════════════════════
       STATS ROW
    ══════════════════════════════════════ */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .stat-box {
      background: var(--surface, #111118);
      border: 1px solid var(--border, #1e1e2e);
      border-radius: 10px;
      padding: 14px 10px;
      text-align: center;
      transition: border-color 0.2s;
    }
    .stat-box:hover { border-color: var(--border-hi, #2e2e4e); }

    .stat-val {
      font-family: 'Syne', sans-serif;
      font-size: 24px;
      font-weight: 800;
      color: var(--gold, #d4a843);
      line-height: 1;
    }
    .stat-lbl {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: var(--muted, #6b6b8a);
      margin-top: 5px;
      line-height: 1.3;
      letter-spacing: 0.06em;
    }

    /* ══════════════════════════════════════
       ACTIVITY FEED
    ══════════════════════════════════════ */
    .activity-list {
      display: flex;
      flex-direction: column;
    }

    .activity-item {
      display: flex;
      align-items: flex-start;
      gap: 11px;
      padding: 11px 0;
      border-bottom: 1px solid var(--border, #1e1e2e);
    }
    .activity-item:last-child { border-bottom: none; }

    .act-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-top: 5px;
      flex-shrink: 0;
    }
    .act-dot.MCQ       { background: var(--mcq,  #e05a5a); box-shadow: 0 0 5px var(--mcq,  #e05a5a); }
    .act-dot.Physics   { background: var(--phys, #7c6af0); box-shadow: 0 0 5px var(--phys, #7c6af0); }
    .act-dot.Chemistry { background: var(--chem, #4ecdc4); box-shadow: 0 0 5px var(--chem, #4ecdc4); }

    .act-body { flex: 1; line-height: 1.4; }
    .act-subject {
      font-family: 'Syne', sans-serif;
      font-size: 10px;
      font-weight: 700;
      line-height: 1.3;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted, #6b6b8a);
    }
    .act-detail {
      font-family: 'Crimson Pro', Georgia, serif;
      color: var(--text, #e8e8f0);
      font-size: 14px;
      line-height: 1.3;
      margin-top: 1px;
    }

    .act-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      flex-shrink: 0;
    }

    .act-score {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 4px;
      white-space: nowrap;
      line-height: 1.4;
    }
    .act-score.high { background: rgba(76,175,125,0.12); color: var(--green, #4caf7d); }
    .act-score.mid  { background: rgba(212,168,67,0.12);  color: var(--gold,  #d4a843); }
    .act-score.low  { background: rgba(224,90,90,0.12);   color: var(--mcq,   #e05a5a); }

    .act-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: var(--muted, #6b6b8a);
      white-space: nowrap;
      line-height: 1.3;
    }

    .empty-feed {
      text-align: center;
      padding: 28px 20px;
      color: var(--muted, #6b6b8a);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      line-height: 1.7;
      border: 1px dashed var(--border, #1e1e2e);
      border-radius: 10px;
    }

    /* ══════════════════════════════════════
       EXPORT BUTTON
    ══════════════════════════════════════ */
    .btn-export {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1px solid var(--border, #1e1e2e);
      border-radius: 8px;
      color: var(--muted, #6b6b8a);
      font-family: 'Syne', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      line-height: 1;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-export:hover { border-color: var(--gold, #d4a843); color: var(--gold, #d4a843); }

    /* ══════════════════════════════════════
       STAGGERED ENTRANCE ANIMATION
    ══════════════════════════════════════ */
    .fade-in {
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.4s ease forwards;
    }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in:nth-child(1) { animation-delay: 0.05s; }
    .fade-in:nth-child(2) { animation-delay: 0.12s; }
    .fade-in:nth-child(3) { animation-delay: 0.19s; }
    .fade-in:nth-child(4) { animation-delay: 0.26s; }
    .fade-in:nth-child(5) { animation-delay: 0.33s; }
  </style>
</head>
<body>

  <!-- ── Header ── -->
  <header class="hub-header">
    <div class="header-left">
      <div class="hub-title">
        <span class="accent">🫵</span> this idiot got<br>tricked again🤣
      </div>
      <div class="hub-date" id="today-date"></div>
    </div>
    <button id="music-toggle" onclick="AudioManager.toggle()" title="Toggle music">♪</button>
  </header>

  <div class="page">

    <!-- ── Quick Start ── -->
    <div class="section fade-in">
      <div class="section-label">Here we go again</div>
      <div class="subject-grid">

        <a class="btn-subject chem" href="pbl_full_pasha.html">
          <div class="subj-icon">🇹🇷🇹🇷</div>
          <div class="subj-label">
            <div>kemal pasha</div>
            <div class="subj-meta">commander of Armenia</div>
          </div>
          <div class="subj-arrow">›</div>
        </a>

        <a class="btn-subject phys" href="phiross.html">
          <div class="subj-icon">👑</div>
          <div class="subj-label">
            <div>pharaoh</div>
            <div class="subj-meta">gypsy</div>
          </div>
          <div class="subj-arrow">›</div>
        </a>

        <a class="btn-subject mcq" href="phiross_factory.html">
          <div class="subj-icon">🍨</div>
          <div class="subj-label">
            <div>water dispenser</div>
            <div class="subj-meta">icecream</div>
          </div>
          <div class="subj-arrow">›</div>
        </a>

      </div>
    </div>

    <!-- ── Stats ── -->
    <div class="section fade-in">
      <div class="section-label">Your Stupid Activities</div>
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-val" id="stat-total">—</div>
          <div class="stat-lbl">Questions</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" id="stat-sessions">—</div>
          <div class="stat-lbl">Sessions</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" id="stat-avg">—</div>
          <div class="stat-lbl">Avg Score</div>
        </div>
      </div>
    </div>

    <!-- ── Activity Feed ── -->
    <div class="section fade-in">
      <div class="section-label">Recent Stupidities</div>
      <div class="activity-list" id="activity-list">
        <div class="empty-feed">DO SOMETHING LAZY<br>no history yet</div>
      </div>
    </div>

    <!-- ── Export ── -->
    <div class="section fade-in">
      <div class="section-label">Data</div>
      <button class="btn-export" onclick="exportData()">
        we know you are too dumb to track 18 sets, save history here 
      </button>
    </div>

  </div><!-- /page -->

  <script src="cordova.js"></script>
  <script src="tracker.js"></script>
  <script src="audio.js"></script>
  <script>

    // ── Date ──────────────────────────────────────────────
    document.getElementById('today-date').textContent =
      new Date().toLocaleDateString('en-IN', {
        weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
      });

    // ── Stats ─────────────────────────────────────────────
    function renderStats() {
      if (typeof Tracker === 'undefined') return;
      const s = Tracker.getStats();
      document.getElementById('stat-total').textContent    = s.totalQuestions || '0';
      document.getElementById('stat-sessions').textContent = s.totalSessions  || '0';
      document.getElementById('stat-avg').textContent      = s.totalSessions  ? s.avgScore + '%' : '—';
    }

    // ── Activity feed ─────────────────────────────────────
    function renderActivity() {
      if (typeof Tracker === 'undefined') return;
      const list   = document.getElementById('activity-list');
      const recent = Tracker.getRecent(8);
      if (!recent.length) return;

      list.innerHTML = recent.map(e => {
        let scoreBadge = '';
        if (e.type === 'score') {
          const cls = e.score >= 75 ? 'high' : e.score >= 50 ? 'mid' : 'low';
          scoreBadge = `<span class="act-score ${cls}">${e.score}%</span>`;
        }
        const detail = e.type === 'score'
          ? `${e.topic} &middot; ${e.correct}/${e.total} correct`
          : `Read: ${e.chapter}`;

        return `
          <div class="activity-item">
            <div class="act-dot ${e.subject}"></div>
            <div class="act-body">
              <div class="act-subject">${e.subject}</div>
              <div class="act-detail">${detail}</div>
            </div>
            <div class="act-right">
              ${scoreBadge}
              <div class="act-time">${Tracker.timeAgo(e.ts)}</div>
            </div>
          </div>`;
      }).join('');
    }

    // ── Export ────────────────────────────────────────────
    function exportData() {
      const blob = new Blob([Tracker.exportJSON()], { type: 'application/json' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = `study-log-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    // ── Tracker event listener ────────────────────────────
    window.addEventListener('tracker:update', () => {
      renderStats();
      renderActivity();
    });

    // ── Init ──────────────────────────────────────────────
    renderStats();
    renderActivity();

  </script>

  <!-- Audio init in its own block so any tracker errors above can't block it -->
  <script>
    AudioManager.init('dashboard.m4a');
  </script>
</body>
</html>
