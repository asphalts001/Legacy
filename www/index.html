<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <link rel="stylesheet" href="theme.css">
  <title>Bhalo hai</title>


  <style>

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Crimson Pro', Georgia, serif;
      font-size: 16px;
      min-height: 100vh;
      padding: 24px 18px 60px;
      max-width: 480px;
      margin: 0 auto;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Header ── */
    .hub-header { margin-bottom: 32px; padding-top: 8px; }

    .hub-title {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }
    .hub-title span { color: var(--phys); }

    .hub-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      line-height: 1.4;
    }

    /* ── Section labels ── */
    .section-label {
      font-family: 'Syne', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      line-height: 1;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Subject buttons ── */
    .subject-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 32px; }

    .btn-subject {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-decoration: none;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
      line-height: 1;
    }
    .btn-subject:active { transform: scale(0.98); }

    .btn-subject.chem { --c: var(--chem); }
    .btn-subject.phys { --c: var(--phys); }
    .btn-subject.mcq  { --c: var(--mcq);  }

    .btn-subject:hover {
      border-color: var(--c);
      box-shadow: 0 0 0 1px var(--c);
    }

    .subj-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      line-height: 1;
      overflow: hidden;
      background: color-mix(in srgb, var(--c) 12%, transparent);
      color: var(--c);
      flex-shrink: 0;
    }
    .subj-label { flex: 1; }
    .subj-arrow { color: var(--muted); font-size: 18px; line-height: 1; }

    /* ── Stats row ── */
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 32px; }

    .stat-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 12px;
      text-align: center;
    }
    .stat-val {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: var(--gold);
      line-height: 1;
    }
    .stat-lbl {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      margin-top: 5px;
      line-height: 1.3;
    }

    /* ── Activity feed ── */
    .activity-list { display: flex; flex-direction: column; gap: 0; margin-bottom: 28px; }

    .activity-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .activity-item:last-child { border-bottom: none; }

    .act-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 5px;
      flex-shrink: 0;
    }
    .act-dot.MCQ      { background: var(--mcq);  box-shadow: 0 0 5px var(--mcq);  }
    .act-dot.Physics  { background: var(--phys); box-shadow: 0 0 5px var(--phys); }
    .act-dot.Chemistry{ background: var(--chem); box-shadow: 0 0 5px var(--chem); }

    .act-body { flex: 1; font-size: 14px; line-height: 1.4; }
    .act-subject {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      line-height: 1.3;
    }
    .act-detail {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .act-score {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 4px;
      white-space: nowrap;
      line-height: 1.4;
    }
    .act-score.high { background: rgba(76,175,125,0.12); color: var(--green); }
    .act-score.mid  { background: rgba(212,168,67,0.12);  color: var(--gold);  }
    .act-score.low  { background: rgba(224,90,90,0.12);   color: var(--mcq);   }

    .act-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      margin-top: 3px;
      line-height: 1.3;
    }

    .empty-feed {
      text-align: center;
      padding: 28px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      line-height: 1.6;
      border: 1px dashed var(--border);
      border-radius: 10px;
    }

    /* ── Export button ── */
    .btn-export {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      line-height: 1;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-export:hover { border-color: var(--gold); color: var(--gold); }
  </style>
</head>
<body>

  <header class="hub-header">
    <div class="hub-title">look we tricked this idot <span> by labeling this as ufc</span></span></div>
    <div class="hub-date" id="today-date"></div>
  </header>

  <div class="section-label">here we go again</div>
  <div class="subject-grid">
    <a class="btn-subject chem" href="pbl_full_pasha.html">
      <div class="subj-icon">🧪</div>
      <div class="subj-label">kemal pasha</div>
      <div class="subj-arrow">›</div>
    </a>
    <a class="btn-subject phys" href="phiross.html">
      <div class="subj-icon">⚛️</div>
      <div class="subj-label">pharaoh</div>
      <div class="subj-arrow">›</div>
    </a>
    <a class="btn-subject mcq" href="phiross_factory.html">
      <div class="subj-icon">📝</div>
      <div class="subj-label">phiross factory</div>
      <div class="subj-arrow">›</div>
    </a>
  </div>

  <div class="section-label">Your Stopidity</div>
  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-val" id="stat-total">—</div>
      <div class="stat-lbl">Questions</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="stat-sessions">—</div>
      <div class="stat-lbl">Sessions</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="stat-avg">—</div>
      <div class="stat-lbl">Avg Score</div>
    </div>
  </div>

  <div class="section-label">Recent stupidities</div>
  <div class="activity-list" id="activity-list">
    <div class="empty-feed">DO SOMETHING LAZY no history yet</div>
  </div>

  <div class="section-label">Data ( come on we both know how lazy are you)</div>
  <button class="btn-export" onclick="exportData()">⬇ Export Activity</button>

  <script src="tracker.js"></script>
  <script>

    document.getElementById('today-date').textContent =
      new Date().toLocaleDateString('en-IN', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

    function renderStats() {
      const s = Tracker.getStats();
      document.getElementById('stat-total').textContent    = s.totalQuestions || '0';
      document.getElementById('stat-sessions').textContent = s.totalSessions  || '0';
      document.getElementById('stat-avg').textContent      = s.totalSessions ? s.avgScore + '%' : '—';
    }

    function renderActivity() {
      const list   = document.getElementById('activity-list');
      const recent = Tracker.getRecent(8);
      if (!recent.length) return;

      list.innerHTML = recent.map(e => {
        let scoreBadge = '';
        if (e.type === 'score') {
          const cls = e.score >= 75 ? 'high' : e.score >= 50 ? 'mid' : 'low';
          scoreBadge = `<span class="act-score ${cls}">${e.score}%</span>`;
        }
        const detail = e.type === 'score'
          ? `${e.topic} · ${e.correct}/${e.total} correct`
          : `Read: ${e.chapter}`;

        return `
          <div class="activity-item">
            <div class="act-dot ${e.subject}"></div>
            <div class="act-body">
              <div class="act-subject">${e.subject}</div>
              <div class="act-detail">${detail}</div>
            </div>
            ${scoreBadge}
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px">
              <div class="act-time">${Tracker.timeAgo(e.ts)}</div>
            </div>
          </div>`;
      }).join('');
    }

    function exportData() {
      const blob = new Blob([Tracker.exportJSON()], { type: 'application/json' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = `study-log-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    window.addEventListener('tracker:update', () => {
      renderStats();
      renderActivity();
    });

    renderStats();
    renderActivity();

  </script>
<script src="cordova.js"></script>
</body>
</html>
