<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Germania</title>
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="gm.css">
</head>
<body>

<!-- Header -->
<div id="header">
  <div>
    <div id="header-label">Germania</div>
    <div id="header-title"> Set — 45 Questions</div>
  </div>
  <div id="header-right">
    <div id="timer">⏱ 45:00</div>
    <div id="attempted-count">0/45 done</div>
    <button id="submit-btn" onclick="submitQuiz()">Submit →</button>
  </div>
</div>

<!-- Progress strip -->
<div id="progress-strip"><div id="progress-fill" style="width:0%"></div></div>

<!-- Layout -->
<div id="layout">
  <!-- Sidebar hidden via CSS (q-grid kept for JS state tracking) -->
  <div id="sidebar">
    <div id="q-grid"></div>
    <div id="legend"></div>
  </div>

  <!-- Main -->
  <div id="main">
    <!-- Question Card -->
    <div id="q-card">
      <div id="q-card-top">
        <div id="q-meta">
          <div id="topic-badge"></div>
          <div id="q-num"></div>
        </div>
        <button id="flag-btn" onclick="toggleFlag()">⚑ Flag</button>
      </div>
      <div id="q-text"></div>
    </div>

    <!-- Options -->
    <div id="options"></div>

    <!-- Actions -->
    <div id="actions"></div>

    <!-- Explanation -->
    <div id="explanation" style="display:none;">
      <div id="explanation-label">EXPLANATION</div>
      <div id="explanation-text"></div>
    </div>

    <!-- Performance Summary -->
    <div id="perf-summary" style="display:none;">
      <div id="perf-label">PERFORMANCE SUMMARY</div>
      <div id="perf-grid"></div>
    </div>
  </div>
</div>

<script>
const questions = [
  { id:1, topic:"Atomic Structure", q:"The uncertainty in position and momentum of an electron moving with velocity 3 × 10⁴ m/s (uncertainty in velocity = 0.01%) is approximately (h = 6.63 × 10⁻³⁴ J·s, m = 9.1 × 10⁻³¹ kg):", options:["1.93 × 10⁻² m","1.93 × 10⁻³ m","1.93 × 10⁻⁴ m","1.93 × 10⁻⁵ m"], answer:0, explanation:"Δx·Δp ≥ h/4π. Δv = 0.01% of 3×10⁴ = 3 m/s. Δp = mΔv = 9.1×10⁻³¹ × 3 ≈ 2.73×10⁻³⁰. Δx = h/(4πΔp) ≈ 1.93×10⁻² m." },
  { id:2, topic:"Thermodynamics", q:"For the reaction N₂(g) + 3H₂(g) → 2NH₃(g), ΔH = −92 kJ/mol. The ΔU at 298 K is:", options:["−87.04 kJ/mol","−96.96 kJ/mol","−92 kJ/mol","+87.04 kJ/mol"], answer:0, explanation:"ΔH = ΔU + ΔngRT. Δng = 2−4 = −2. ΔU = −92 − (−2)(8.314×10⁻³)(298) = −92 + 4.955 ≈ −87.04 kJ/mol." },
  { id:3, topic:"Chemical Equilibrium", q:"For the reaction PCl₅ ⇌ PCl₃ + Cl₂, Kp = 1.78 atm at 250°C. The degree of dissociation at 2 atm total pressure is:", options:["0.686","0.574","0.421","0.312"], answer:0, explanation:"Kp = α²P/(1−α²). 1.78 = α²(2)/(1−α²). Solving: 1.78 − 1.78α² = 2α². α² = 1.78/3.78 = 0.471, α ≈ 0.686." },
  { id:4, topic:"Electrochemistry", q:"The standard cell potential of Zn-Cu galvanic cell is 1.10 V. When [Zn²⁺] = 0.1 M and [Cu²⁺] = 0.01 M at 298 K, the cell potential is:", options:["1.04 V","1.10 V","1.16 V","1.07 V"], answer:3, explanation:"E = E° − (0.0591/n)log([Zn²⁺]/[Cu²⁺]) = 1.10 − (0.0591/2)log(10) = 1.10 − 0.02955 ≈ 1.07 V." },
  { id:5, topic:"Chemical Kinetics", q:"A first-order reaction has rate constant 1.15 × 10⁻³ s⁻¹. The time required for 75% completion of the reaction is:", options:["1200 s","1202 s","602 s","2400 s"], answer:1, explanation:"t = (2.303/k)log(1/(1−x)) = (2.303/1.15×10⁻³)log(1/0.25) = 2003 × 0.6021 ≈ 1202 s." },
  { id:6, topic:"Solutions", q:"The osmotic pressure of a 5% (w/v) solution of cane sugar (M = 342 g/mol) at 15°C is:", options:["3.45 atm","3.72 atm","4.12 atm","2.98 atm"], answer:0, explanation:"π = CRT = (50/342)(0.0821)(288) = 0.1462 × 23.64 ≈ 3.45 atm." },
  { id:7, topic:"Solid State", q:"Gold crystallizes in FCC. Edge length = 4.08 Å, M = 197 g/mol. The density of gold is:", options:["19.4 g/cm³","17.2 g/cm³","21.3 g/cm³","15.6 g/cm³"], answer:0, explanation:"ρ = ZM/(Nₐa³) = (4×197)/(6.022×10²³×(4.08×10⁻⁸)³) ≈ 19.4 g/cm³." },
  { id:8, topic:"Surface Chemistry", q:"Which of the following is an example of a lyophilic colloid?", options:["Gold sol","Starch sol","Arsenic sulphide sol","Silver sol"], answer:1, explanation:"Lyophilic colloids have high affinity for dispersion medium. Starch, proteins, and gums are lyophilic. Gold, As₂S₃, and silver sols are lyophobic." },
  { id:9, topic:"Redox Reactions", q:"In the reaction: Cr₂O₇²⁻ + 14H⁺ + 6e⁻ → 2Cr³⁺ + 7H₂O, the equivalent weight of K₂Cr₂O₇ (M = 294) is:", options:["49","98","294","147"], answer:0, explanation:"n-factor = 6 (6 electrons gained per formula unit). Eq. wt. = 294/6 = 49." },
  { id:10, topic:"Gaseous State", q:"At 27°C, the rms velocity of SO₂ molecules is approximately (M = 64 g/mol):", options:["342 m/s","384 m/s","217 m/s","484 m/s"], answer:0, explanation:"u_rms = √(3RT/M) = √(3×8.314×300/0.064) ≈ 342 m/s." },
  { id:11, topic:"p-Block Elements", q:"Which among the following is the strongest reducing agent in aqueous solution?", options:["F⁻","Cl⁻","Br⁻","I⁻"], answer:3, explanation:"Reducing power of halide ions: I⁻ > Br⁻ > Cl⁻ > F⁻. I⁻ is easiest to oxidize due to largest size and most polarizable electron cloud." },
  { id:12, topic:"d-Block Elements", q:"The magnetic moment (spin-only) of [Fe(CN)₆]³⁻ is approximately:", options:["5.92 BM","4.90 BM","1.73 BM","0 BM"], answer:2, explanation:"CN⁻ is a strong field ligand. Fe³⁺ has low-spin t₂g⁵ eg⁰. Unpaired electrons = 1. μ = √(1×3) = 1.73 BM." },
  { id:13, topic:"Coordination Compounds", q:"The IUPAC name of [Pt(NH₃)₂Cl₂] (square planar) is:", options:["Diamminedichloroplatinum(II)","Dichlorodiammineplatinum(II)","Platinum(II) diamminedichloride","Diamminedichloroplatinate(II)"], answer:0, explanation:"Ligands listed alphabetically (ammine before chlorido), then metal with oxidation state → diamminedichloridoplatinum(II)." },
  { id:14, topic:"s-Block Elements", q:"Which of the following has the highest thermal stability?", options:["MgCO₃","BeCO₃","CaCO₃","BaCO₃"], answer:3, explanation:"Thermal stability of alkaline earth metal carbonates increases down the group: BeCO₃ < MgCO₃ < CaCO₃ < SrCO₃ < BaCO₃." },
  { id:15, topic:"Hydrogen", q:"Heavy water (D₂O) is used in nuclear reactors as:", options:["Fuel","Moderator and coolant","Shielding material","Control rod"], answer:1, explanation:"D₂O is an excellent moderator (slows neutrons) and coolant in CANDU-type reactors. It has low neutron absorption cross-section." },
  { id:16, topic:"Chemical Bonding", q:"The bond angle in NF₃ is less than NH₃ because:", options:["F is more electronegative, pulling bonding pairs away from N, reducing repulsion","N−F bond is longer than N−H bond","NF₃ has more lone pairs","F has smaller size than H"], answer:0, explanation:"In NF₃, F pulls bonding electron pairs away from N, reducing bp-bp repulsion relative to lp-bp repulsion → 102.5° vs 107.8° in NH₃." },
  { id:17, topic:"p-Block Elements", q:"Which of the following oxoacids of phosphorus has P in +3 oxidation state and is a diprotic acid?", options:["H₃PO₄","H₃PO₃","H₃PO₂","HPO₃"], answer:1, explanation:"H₃PO₃ (phosphorous acid) has P in +3 state and is diprotic — 2 ionizable OH groups and 1 P−H bond (non-ionizable)." },
  { id:18, topic:"General Principles of Metallurgy", q:"The process used to refine nickel is:", options:["Van Arkel method","Zone refining","Mond's process","Electrolytic refining"], answer:2, explanation:"Mond's process uses CO to form volatile Ni(CO)₄ which is decomposed at 450–470 K to give pure Ni." },
  { id:19, topic:"Environmental Chemistry", q:"The most harmful form of air pollution that causes photochemical smog is:", options:["SO₂","CO₂","PAN (peroxyacetyl nitrate)","CO"], answer:2, explanation:"PAN is a key component of photochemical smog — a powerful eye irritant formed from NOₓ and hydrocarbons under UV light." },
  { id:20, topic:"Classification of Elements", q:"Which of the following has the highest first ionization energy?", options:["O","N","F","Ne"], answer:3, explanation:"IE₁ order: Ne > F > N > O. Ne has completely filled shells. N has extra stability (half-filled 2p³). Ne has highest IE₁ overall." },
  { id:21, topic:"Hydrocarbons", q:"When propyne reacts with HBr in presence of peroxide, the major product is:", options:["1-bromopropene","2-bromopropane","1-bromopropane","2-bromopropene"], answer:2, explanation:"In presence of peroxide, anti-Markovnikov addition occurs (free radical mechanism). Br goes to terminal carbon → 1-bromopropane." },
  { id:22, topic:"Haloalkanes", q:"Which of the following undergoes SN1 reaction most readily?", options:["(CH₃)₃CCl","CH₃Cl","CH₃CH₂Cl","(CH₃)₂CHCl"], answer:0, explanation:"(CH₃)₃CCl forms the most stable 3° carbocation. SN1 rate: 3° > 2° > 1° > methyl." },
  { id:23, topic:"Alcohols, Phenols and Ethers", q:"Lucas test can distinguish between 1°, 2°, and 3° alcohols. The correct order of reactivity with Lucas reagent (ZnCl₂/conc. HCl) is:", options:["3° > 2° > 1°","1° > 2° > 3°","2° > 3° > 1°","All react at same rate"], answer:0, explanation:"Lucas reagent reacts via SN1. 3° alcohols react immediately, 2° in 5 min, 1° don't react at room temperature." },
  { id:24, topic:"Aldehydes and Ketones", q:"Benzaldehyde does NOT give Fehling's test but gives Tollen's test. This is because:", options:["Fehling's is more specific for aliphatic aldehydes","Benzaldehyde cannot reduce Cu²⁺ in alkaline tartrate but can reduce Ag⁺","Benzaldehyde is a ketone","Benzaldehyde gives resinification with NaOH"], answer:0, explanation:"Fehling's requires stronger reducing power. Aromatic aldehydes reduce Ag⁺ (milder oxidant) but not Cu²⁺ in Fehling's." },
  { id:25, topic:"Carboxylic Acids", q:"The correct order of acidic strength among the following is:", options:["CCl₃COOH > CHCl₂COOH > CH₂ClCOOH > CH₃COOH","CH₃COOH > CH₂ClCOOH > CHCl₂COOH > CCl₃COOH","CHCl₂COOH > CCl₃COOH > CH₂ClCOOH > CH₃COOH","All have same acidity"], answer:0, explanation:"Cl is electron withdrawing (−I effect). More Cl atoms → more acidic. CCl₃COOH > CHCl₂COOH > CH₂ClCOOH > CH₃COOH." },
  { id:26, topic:"Amines", q:"The correct order of basicity of methylamines in aqueous solution is:", options:["(CH₃)₂NH > CH₃NH₂ > (CH₃)₃N > NH₃","CH₃NH₂ > (CH₃)₂NH > (CH₃)₃N > NH₃","(CH₃)₃N > (CH₃)₂NH > CH₃NH₂ > NH₃","NH₃ > CH₃NH₂ > (CH₃)₂NH > (CH₃)₃N"], answer:0, explanation:"In aqueous solution, solvation matters. (CH₃)₂NH > CH₃NH₂ > (CH₃)₃N > NH₃. Trimethylamine's basicity is reduced by steric hindrance." },
  { id:27, topic:"Biomolecules", q:"Which of the following amino acids has an aromatic R-group and absorbs UV light at 280 nm?", options:["Glycine","Alanine","Tryptophan","Serine"], answer:2, explanation:"Tryptophan (Trp, W) has an indole side chain absorbing strongly at 280 nm, used to measure protein concentration spectrophotometrically." },
  { id:28, topic:"Polymers", q:"Neoprene is a polymer of:", options:["Isoprene","Chloroprene","Styrene","Acrylonitrile"], answer:1, explanation:"Neoprene (polychloroprene) is obtained by free radical polymerization of chloroprene (2-chloro-1,3-butadiene)." },
  { id:29, topic:"Chemistry in Everyday Life", q:"Which drug is both analgesic and antipyretic and belongs to the class of non-narcotic analgesics?", options:["Morphine","Aspirin","Codeine","Heroin"], answer:1, explanation:"Aspirin (acetylsalicylic acid) is a non-narcotic analgesic with analgesic, antipyretic, and anti-inflammatory properties." },
  { id:30, topic:"Organic Chemistry Principles", q:"The correct IUPAC name of CH₃-CH=CH-CHO is:", options:["But-2-enal","2-butenal","3-butenal","But-3-enal"], answer:0, explanation:"CHO = C1. Double bond at C2−C3 → but-2-enal." },
  { id:31, topic:"Ionic Equilibrium", q:"The pH of 0.1 M solution of CH₃COOH (Ka = 1.8 × 10⁻⁵) is approximately:", options:["3.37","2.87","4.74","1.00"], answer:1, explanation:"[H⁺] = √(Ka × C) = √(1.8×10⁻⁶) = 1.34×10⁻³. pH = −log(1.34×10⁻³) ≈ 2.87." },
  { id:32, topic:"Electrochemistry", q:"The amount of electricity required to deposit 108 g of silver (M = 108, n = 1) from AgNO₃ solution is:", options:["96500 C","48250 C","193000 C","24125 C"], answer:0, explanation:"1 mole Ag requires 1 Faraday = 96500 C. 108 g = 1 mol Ag → 96500 C." },
  { id:33, topic:"Nuclear Chemistry", q:"The half-life of a radioactive element is 10 years. The fraction remaining after 40 years is:", options:["1/16","1/8","1/4","1/32"], answer:0, explanation:"n = t/t½ = 40/10 = 4 half-lives. Fraction = (1/2)⁴ = 1/16." },
  { id:34, topic:"Colligative Properties", q:"The boiling point elevation for 1.0 M NaCl solution (Kb = 0.52 K·kg/mol, complete dissociation) is:", options:["1.04°C","0.52°C","2.08°C","0.26°C"], answer:0, explanation:"NaCl → Na⁺ + Cl⁻, i = 2. ΔTb = i·Kb·m = 2 × 0.52 × 1.0 = 1.04°C." },
  { id:35, topic:"Thermodynamics", q:"For a spontaneous process at constant T and P, which condition is always true?", options:["ΔG = 0","ΔG < 0","ΔG > 0","ΔS < 0"], answer:1, explanation:"ΔG < 0 for spontaneous processes at constant T and P. ΔG = 0 at equilibrium." },
  { id:36, topic:"Qualitative Analysis", q:"The brown ring formed in the ring test for NO₃⁻ ion is due to the formation of:", options:["[Fe(H₂O)₅(NO)]²⁺","Fe(NO₃)₃","FeSO₄·(NO)₂","Fe₂O₃"], answer:0, explanation:"The brown ring complex is [Fe(H₂O)₅(NO)]²⁺ — a nitrosyl complex of Fe²⁺ formed when NO coordinates to Fe²⁺." },
  { id:37, topic:"Transition Metals", q:"KMnO₄ acts as an oxidizing agent in different media. In neutral medium, Mn goes from +7 to:", options:["+2","+4","+6","+3"], answer:1, explanation:"In neutral/weakly alkaline medium, KMnO₄ is reduced to MnO₂ (brown precipitate), Mn: +7 → +4." },
  { id:38, topic:"Chemical Bonding", q:"The structure of XeF₄ according to VSEPR theory is:", options:["Tetrahedral","See-saw","Square planar","Octahedral"], answer:2, explanation:"XeF₄ has 6 electron pairs (4 bp + 2 lp) → octahedral geometry with 2 lone pairs at axial positions → square planar molecular geometry." },
  { id:39, topic:"Reaction Mechanisms", q:"The reagent used to convert a primary amine to a diazonium salt is:", options:["NaNO₂/HCl at 0–5°C","HNO₃","NaNO₂ at room temp","NO₂ gas"], answer:0, explanation:"Diazotization: RNH₂ + NaNO₂ + HCl at 0–5°C → RN₂⁺Cl⁻. Temperature must be kept below 5°C." },
  { id:40, topic:"Stereochemistry", q:"Which of the following compounds exhibits geometric (cis-trans) isomerism?", options:["2-methylpropene","But-2-ene","Propene","But-1-ene"], answer:1, explanation:"But-2-ene: each doubly bonded carbon has two different substituents (CH₃ and H) → cis and trans isomers exist." },
  { id:41, topic:"Carbohydrates", q:"Which monosaccharide is present in the nucleotide of RNA?", options:["Glucose","Fructose","Ribose","Deoxyribose"], answer:2, explanation:"RNA contains D-ribose (a pentose sugar). The 2′-OH group in ribose makes RNA more susceptible to hydrolysis than DNA." },
  { id:42, topic:"Named Reactions", q:"When acetone reacts with excess of chlorine in alkaline conditions, the product formed is:", options:["Chloroacetone","Chloroform","Trichloroacetone","Chloroacetic acid"], answer:1, explanation:"Haloform reaction: CH₃COCH₃ + 3Cl₂/NaOH → CHCl₃ + CH₃COONa." },
  { id:43, topic:"Organic Analysis", q:"Lassaigne's test for nitrogen involves fusion of organic compound with sodium to form sodium cyanide. The confirmatory test uses:", options:["AgNO₃ solution","Freshly prepared FeSO₄ then FeCl₃","CuSO₄ solution","Lime water"], answer:1, explanation:"NaCN + FeSO₄ → Fe(CN)₂ → with FeCl₃ → Prussian blue [Fe₄(Fe(CN)₆)₃] confirms nitrogen." },
  { id:44, topic:"Grignard Reagent", q:"The reaction of methylmagnesium bromide (CH₃MgBr) with formaldehyde (HCHO), followed by hydrolysis, gives:", options:["Methanol","Ethanol","Propan-1-ol","Acetaldehyde"], answer:1, explanation:"CH₃MgBr + HCHO → hydrolysis → CH₃CH₂OH (ethanol). Grignard with formaldehyde gives primary alcohol with one more carbon." },
  { id:45, topic:"Aromaticity", q:"Which of the following species is aromatic according to Hückel's rule (4n+2 π electrons)?", options:["Cyclooctatetraene","Cyclopentadienyl cation (C₅H₅⁺)","Cyclopentadienyl anion (C₅H₅⁻)","Cycloheptatrienyl anion"], answer:2, explanation:"C₅H₅⁻ has 6 π electrons → 4n+2 with n=1. Planar, cyclic, conjugated → aromatic. C₅H₅⁺ has 4 π e⁻ (antiaromatic)." },
];

const topicColors = {
  "Atomic Structure":"#4FC3F7","Thermodynamics":"#FF7043","Chemical Equilibrium":"#66BB6A",
  "Electrochemistry":"#AB47BC","Chemical Kinetics":"#FFA726","Solutions":"#26C6DA",
  "Solid State":"#EF5350","Surface Chemistry":"#8D6E63","Redox Reactions":"#EC407A",
  "Gaseous State":"#7E57C2","p-Block Elements":"#26A69A","d-Block Elements":"#5C6BC0",
  "Coordination Compounds":"#F06292","s-Block Elements":"#D4E157","Hydrogen":"#29B6F6",
  "Chemical Bonding":"#FF7043","General Principles of Metallurgy":"#78909C",
  "Environmental Chemistry":"#66BB6A","Classification of Elements":"#FFCA28",
  "Hydrocarbons":"#42A5F5","Haloalkanes":"#26C6DA","Alcohols, Phenols and Ethers":"#EC407A",
  "Aldehydes and Ketones":"#FFA726","Carboxylic Acids":"#EF5350","Amines":"#AB47BC",
  "Biomolecules":"#66BB6A","Polymers":"#8D6E63","Chemistry in Everyday Life":"#29B6F6",
  "Organic Chemistry Principles":"#7E57C2","Ionic Equilibrium":"#F06292",
  "Nuclear Chemistry":"#FF5252","Colligative Properties":"#26A69A",
  "Qualitative Analysis":"#FFCA28","Transition Metals":"#42A5F5",
  "Reaction Mechanisms":"#EC407A","Stereochemistry":"#5C6BC0","Carbohydrates":"#66BB6A",
  "Named Reactions":"#FF7043","Organic Analysis":"#8D6E63","Grignard Reagent":"#AB47BC","Aromaticity":"#FFA726",
};

// State
let current = 0;
let selected = null;
let answered = Array(45).fill(null);
let showExplanation = false;
let submitted = false;
let timeLeft = 45 * 60;
let timerActive = true;
let flagged = Array(45).fill(false);
let timerInterval = null;

// Init
window.onload = () => {
  buildGrid();
  buildLegend();
  startTimer();
  render();
};

function startTimer() {
  timerInterval = setInterval(() => {
    if (!timerActive || submitted) return;
    timeLeft--;
    updateTimer();
    if (timeLeft <= 0) { clearInterval(timerInterval); submitQuiz(); }
  }, 1000);
}

function updateTimer() {
  const mins = Math.floor(timeLeft / 60).toString().padStart(2, '0');
  const secs = (timeLeft % 60).toString().padStart(2, '0');
  const el = document.getElementById('timer');
  el.textContent = `⏱ ${mins}:${secs}`;
  el.className = timeLeft < 300 ? 'urgent' : '';
}

function buildGrid() {
  const grid = document.getElementById('q-grid');
  grid.innerHTML = '';
  questions.forEach((_, i) => {
    const btn = document.createElement('button');
    btn.className = 'q-btn';
    btn.id = `qb-${i}`;
    btn.onclick = () => goTo(i);
    btn.innerHTML = `${i+1}<span class="flag-dot" id="fd-${i}" style="display:none">🚩</span>`;
    grid.appendChild(btn);
  });
}

function buildLegend() {
  const legend = document.getElementById('legend');
  legend.innerHTML = '';
  const items = [
    { color: '#AB47BC', label: 'Attempted' },
    { color: '#4a5568', label: 'Not Attempted' },
  ];
  items.forEach(l => {
    const div = document.createElement('div');
    div.className = 'legend-item';
    div.innerHTML = `<div class="legend-dot" style="background:${l.color}40;border:1px solid ${l.color}"></div>${l.label}`;
    legend.appendChild(div);
  });
}

function updateLegend() {
  const legend = document.getElementById('legend');
  legend.innerHTML = '';
  const items = submitted
    ? [
        { color: '#AB47BC', label: 'Attempted' },
        { color: '#4a5568', label: 'Not Attempted' },
        { color: '#66BB6A', label: 'Correct' },
        { color: '#EF5350', label: 'Wrong' },
      ]
    : [
        { color: '#AB47BC', label: 'Attempted' },
        { color: '#4a5568', label: 'Not Attempted' },
      ];
  items.forEach(l => {
    const div = document.createElement('div');
    div.className = 'legend-item';
    div.innerHTML = `<div class="legend-dot" style="background:${l.color}40;border:1px solid ${l.color}"></div>${l.label}`;
    legend.appendChild(div);
  });
}

function getStatus(i) {
  if (answered[i] === null) return 'unattempted';
  if (answered[i] === questions[i].answer) return 'correct';
  return 'wrong';
}

function updateGrid() {
  questions.forEach((_, i) => {
    const btn = document.getElementById(`qb-${i}`);
    btn.className = 'q-btn';
    if (i === current) btn.classList.add('current');
    if (submitted) {
      const st = getStatus(i);
      if (st !== 'unattempted') btn.classList.add(st);
    } else if (answered[i] !== null) {
      btn.classList.add('attempted');
    }
    document.getElementById(`fd-${i}`).style.display = flagged[i] ? 'inline' : 'none';
  });
}

function render() {
  const q = questions[current];
  const color = topicColors[q.topic] || '#4FC3F7';

  // Header title
  document.getElementById('header-title').textContent = submitted ? '📊 Results' : 'Practice Set — 45 Questions';

  // Header right
  const attempted = answered.filter(a => a !== null).length;
  document.getElementById('attempted-count').textContent = `${attempted}/45 done`;

  // Progress strip
  const pct = Math.round((attempted / 45) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('submit-btn').style.display = submitted ? 'none' : 'inline-block';
  document.getElementById('timer').style.display = submitted ? 'none' : 'inline-block';
  document.getElementById('attempted-count').style.display = submitted ? 'none' : 'inline-block';

  // Results header
  let resultsEl = document.getElementById('results-stats');
  if (!resultsEl) {
    resultsEl = document.createElement('div');
    resultsEl.id = 'results-stats';
    document.getElementById('header-right').appendChild(resultsEl);
  }
  if (submitted) {
    const score = answered.filter((a, i) => a === questions[i].answer).length;
    const wrong = attempted - score;
    const skipped = 45 - attempted;
    const marks = score * 4 - wrong;
    const scoreColor = score >= 30 ? '#66BB6A' : score >= 20 ? '#FFA726' : '#EF5350';
    resultsEl.innerHTML = `
      <div class="stat-box"><div class="stat-val" style="color:${scoreColor}">${score}</div><div class="stat-lbl">CORRECT</div></div>
      <div class="stat-box"><div class="stat-val" style="color:#EF5350">${wrong}</div><div class="stat-lbl">WRONG</div></div>
      <div class="stat-box"><div class="stat-val" style="color:#6b7280">${skipped}</div><div class="stat-lbl">SKIPPED</div></div>
      <div id="marks-box" style="background:${score>=30?'rgba(102,187,106,0.1)':'rgba(239,83,80,0.1)'};border:1px solid ${score>=30?'#66BB6A':'#EF5350'};color:${score>=30?'#66BB6A':'#EF5350'}">${marks}/${45*4} marks</div>
    `;
    resultsEl.style.display = 'flex';
  } else {
    resultsEl.style.display = 'none';
  }

  // Question card
  document.getElementById('q-card').style.borderLeftColor = color;
  const badge = document.getElementById('topic-badge');
  badge.textContent = q.topic;
  badge.style.background = color + '20';
  badge.style.border = `1px solid ${color}40`;
  badge.style.color = color;
  document.getElementById('q-num').textContent = `Q ${current + 1} / 45`;
  document.getElementById('q-text').textContent = q.q;

  // Flag button
  const flagBtn = document.getElementById('flag-btn');
  flagBtn.textContent = flagged[current] ? '🚩 Flagged' : '⚑ Flag';
  flagBtn.className = flagged[current] ? 'flagged' : '';

  // Options
  const optContainer = document.getElementById('options');
  optContainer.innerHTML = '';
  const showResult = submitted || answered[current] !== null;
  q.options.forEach((opt, i) => {
    const isCorrect = i === q.answer;
    const isUserAnswer = answered[current] === i;
    const isSelectedNow = selected === i;

    const btn = document.createElement('button');
    btn.className = 'opt-btn';

    let prefixText = String.fromCharCode(65 + i);
    let prefixBg = '#1e253530';
    let prefixBorder = '#1e2535';
    let prefixColor = '#9ca3af';
    let textColor = '#9ca3af';

    if (showResult) {
      if (isCorrect) {
        btn.classList.add('correct-ans');
        prefixText = '✓'; prefixBg = '#66BB6A30'; prefixBorder = '#66BB6A'; prefixColor = '#86efac'; textColor = '#86efac';
      } else if (isUserAnswer) {
        btn.classList.add('wrong-ans');
        prefixText = '✗'; prefixBg = '#EF535030'; prefixBorder = '#EF5350'; prefixColor = '#fca5a5'; textColor = '#fca5a5';
      }
    } else if (isSelectedNow) {
      btn.classList.add('selected');
      prefixBg = '#4FC3F730'; prefixBorder = '#4FC3F7'; prefixColor = '#7dd3fc'; textColor = '#7dd3fc';
    }

    if (showResult) btn.classList.add('locked');

    btn.innerHTML = `
      <span class="opt-prefix" style="background:${prefixBg};border:1px solid ${prefixBorder};color:${prefixColor}">${prefixText}</span>
      <span class="opt-text" style="color:${textColor}">${opt}</span>
    `;
    if (!showResult) btn.onclick = () => selectOption(i);
    optContainer.appendChild(btn);
  });

  // Actions
  renderActions(color);

  // Explanation
  const expEl = document.getElementById('explanation');
  expEl.style.display = showExplanation ? 'block' : 'none';
  if (showExplanation) document.getElementById('explanation-text').textContent = q.explanation;

  // Performance summary (show only on Q1 after submit)
  const perfEl = document.getElementById('perf-summary');
  if (submitted && current === 0) {
    const score = answered.filter((a, i) => a === questions[i].answer).length;
    const att = answered.filter(a => a !== null).length;
    const wrong = att - score;
    const marks = score * 4 - wrong;
    const acc = att > 0 ? Math.round((score / att) * 100) + '%' : 'N/A';
    const scoreColor = score >= 30 ? '#66BB6A' : '#EF5350';
    document.getElementById('perf-grid').innerHTML = `
      <div class="perf-card"><div class="perf-val" style="color:#66BB6A">${score}/45</div><div class="perf-lbl">SCORE</div></div>
      <div class="perf-card"><div class="perf-val" style="color:#4FC3F7">${marks}/${45*4}</div><div class="perf-lbl">NEET MARKS</div></div>
      <div class="perf-card"><div class="perf-val" style="color:#FFA726">${acc}</div><div class="perf-lbl">ACCURACY</div></div>
      <div class="perf-card"><div class="perf-val" style="color:#6b7280">${45-att}</div><div class="perf-lbl">UNATTEMPTED</div></div>
    `;
    perfEl.style.display = 'block';
  } else {
    perfEl.style.display = 'none';
  }

  updateGrid();
  updateLegend();
}

function renderActions(color) {
  const actions = document.getElementById('actions');
  actions.innerHTML = '';

  if (!submitted) {
    if (answered[current] === null) {
      const saveBtn = document.createElement('button');
      saveBtn.id = 'save-btn';
      saveBtn.textContent = 'Save Answer';
      saveBtn.disabled = selected === null;
      saveBtn.style.background = selected !== null ? `linear-gradient(135deg, ${color}, ${color}99)` : '#1e2535';
      saveBtn.style.color = selected !== null ? '#000' : '#4a5568';
      saveBtn.style.cursor = selected !== null ? 'pointer' : 'default';
      saveBtn.style.border = 'none';
      saveBtn.style.borderRadius = '8px';
      saveBtn.style.padding = '10px 24px';
      saveBtn.style.fontWeight = '700';
      saveBtn.style.fontSize = '13px';
      saveBtn.style.letterSpacing = '0.5px';
      saveBtn.onclick = confirmAnswer;
      actions.appendChild(saveBtn);
    } else {
      const savedBadge = document.createElement('div');
      savedBadge.id = 'saved-badge';
      savedBadge.textContent = '✓ Saved';
      savedBadge.style.cssText = 'background:rgba(102,187,106,0.1);border:1px solid #66BB6A;border-radius:8px;padding:10px 18px;color:#66BB6A;font-size:13px;font-weight:600;';
      actions.appendChild(savedBadge);

      const expBtn = document.createElement('button');
      expBtn.id = 'explain-btn';
      expBtn.textContent = (showExplanation ? 'Hide' : 'Show') + ' Explanation';
      expBtn.onclick = toggleExplanation;
      actions.appendChild(expBtn);
    }
  } else {
    const expBtn = document.createElement('button');
    expBtn.id = 'explain-btn';
    expBtn.textContent = (showExplanation ? 'Hide' : 'Show') + ' Explanation';
    expBtn.onclick = toggleExplanation;
    actions.appendChild(expBtn);
  }

  const nav = document.createElement('div');
  nav.id = 'nav';
  nav.innerHTML = `
    <button class="nav-btn" onclick="goTo(${current-1})" ${current===0?'disabled':''}>← Prev</button>
    <button class="nav-btn" onclick="goTo(${current+1})" ${current===44?'disabled':''}>Next →</button>
  `;
  actions.appendChild(nav);
}

function selectOption(i) {
  selected = i;
  render();
}

function confirmAnswer() {
  if (selected === null) return;
  answered[current] = selected;
  showExplanation = false;
  render();
}

function toggleExplanation() {
  showExplanation = !showExplanation;
  render();
}

function toggleFlag() {
  flagged[current] = !flagged[current];
  render();
}

function goTo(i) {
  if (i < 0 || i > 44) return;
  current = i;
  selected = answered[i];
  showExplanation = false;
  render();
}

function submitQuiz() {
  submitted = true;
  timerActive = false;
  clearInterval(timerInterval);
  current = 0;
  selected = answered[0];
  showExplanation = false;
  render();
}
</script>
</body>
</html>
